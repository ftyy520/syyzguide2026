<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">

  <!-- SEO / 分享 -->
  <meta name="description"    content="">
  <meta property="og:type"    content="website">
  <meta property="og:title"   content="">
  <meta property="og:description" content="">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable"         content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>新生指南</title>

  <!-- 样式表 -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/animations.css">

  <!-- 防闪白：在 CSS 加载前先应用主题色 -->
  <script>
    (function () {
      const t = localStorage.getItem("theme");
      const preferDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute(
        "data-theme",
        t || (preferDark ? "dark" : "light")
      );
    })();
  </script>
</head>

<body>

<!-- ══════════════════════════════════════════
     应用容器
══════════════════════════════════════════ -->
<div class="app-container" id="app">

  <!-- ── 顶部导航栏 ── -->
  <header class="site-header" role="banner">
    <div class="header-inner">

      <!-- 左：汉堡菜单 -->
      <button class="icon-btn" id="menu-btn"
              aria-label="打开菜单" aria-expanded="false"
              aria-controls="sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 5h14M3 10h14M3 15h14"
                stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round"/>
        </svg>
      </button>

      <!-- 中：Logo + 站名 -->
      <button class="header-brand" id="logo-btn" aria-label="打开欢迎介绍">
        <img data-logo src="" alt="" width="28" height="28"
             style="border-radius:6px;object-fit:cover;">
        <span class="header-brand-name" data-site-name></span>
      </button>

      <!-- 右：操作按钮组 -->
      <div class="header-actions" role="toolbar" aria-label="页面操作">

        <!-- 搜索 -->
        <button class="icon-btn" id="search-btn" aria-label="搜索">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="M15 15l3 3" stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round"/>
          </svg>
        </button>

        <!-- 主题切换 -->
        <button class="icon-btn" id="theme-toggle"
                aria-label="切换主题" aria-pressed="false">
          <svg width="20" height="20" viewBox="0 0 24 24"
               fill="none" aria-hidden="true">
            <g id="theme-icon"></g>
          </svg>
        </button>

        <!-- 更多菜单 -->
        <button class="icon-btn" id="more-btn"
                aria-label="更多选项" aria-haspopup="true" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="4"  r="1.5" fill="currentColor"/>
            <circle cx="10" cy="10" r="1.5" fill="currentColor"/>
            <circle cx="10" cy="16" r="1.5" fill="currentColor"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- 面包屑 -->
    <nav id="breadcrumb" class="breadcrumb" aria-label="面包屑导航"
         style="display:none">
      <ol id="breadcrumb-list" class="breadcrumb-list"></ol>
    </nav>
  </header>

  <!-- ── 更多菜单面板 ── -->
  <div class="more-menu" id="more-menu" role="dialog" aria-label="更多选项">
    <div class="more-menu-backdrop"></div>
    <div class="more-menu-panel">
      <button class="more-menu-item" data-action="search">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
          <path d="M15 15l3 3" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round"/>
        </svg>
        搜索内容
      </button>
      <button class="more-menu-item" data-action="theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M16.36 16.36l1.42 1.42
                   M2 12h2M20 12h2M4.22 19.78l1.42-1.42M16.36 7.64l1.42-1.42"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        切换主题
      </button>
      <button class="more-menu-item" data-action="settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m10.72 10.72 1.42 1.42
                   M2 12h2m16 0h2M4.22 19.78l1.42-1.42m10.72-10.72 1.42-1.42"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        设置
      </button>
      <button class="more-menu-item" data-action="home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 12L12 3l9 9" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        回到首页
      </button>
    </div>
  </div>

  <!-- ── 侧边栏 ── -->
  <aside class="sidebar" id="sidebar" aria-label="导航侧边栏">
    <div class="sidebar-backdrop" aria-hidden="true"></div>
    <nav class="sidebar-nav" aria-hidden="true" aria-label="板块导航">

      <!-- 侧边栏顶部 -->
      <div class="sidebar-header">
        <span class="sidebar-title" data-site-name></span>
        <button class="icon-btn sidebar-close-btn" id="sidebar-close-btn"
                aria-label="关闭菜单">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 5l10 10M15 5L5 15"
                  stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- 侧边栏链接列表 -->
      <ul id="sidebar-links" class="sidebar-links" role="list"></ul>

      <!-- 侧边栏底部 -->
      <div class="sidebar-footer">
        <span data-site-name></span>
        <span data-year></span>
      </div>

    </nav>
  </aside>

  <!-- ── 主视图区域 ── -->
  <main id="main-content" role="main">

    <!-- ────────────────────────────
         首页视图
    ──────────────────────────── -->
    <div id="home-view">

      <!-- Hero 区域 -->
      <section class="hero-section" aria-label="欢迎语">
        <div class="hero-content">
          <h1 class="hero-title" id="hero-title"></h1>
          <p  class="hero-subtitle" id="hero-subtitle"></p>
          <button class="hero-cta-btn" id="hero-cta-btn"
                  aria-label="开始探索">
            开始探索
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M8 3l5 5-5 5M3 8h10"
                    stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- 板块卡片区 -->
      <section class="cards-section" aria-label="板块导航">

        <div class="cards-header">
          <div>
            <h2 class="cards-section-title" id="cards-section-title"></h2>
            <p  class="cards-section-subtitle" id="cards-section-subtitle"></p>
          </div>
          <div class="cards-nav" role="group" aria-label="卡片翻页">
            <button class="icon-btn cards-nav-btn" id="cards-prev"
                    aria-label="上一张">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M11 4L6 9l5 5"
                      stroke="currentColor" stroke-width="1.6"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="icon-btn cards-nav-btn" id="cards-next"
                    aria-label="下一张">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M7 4l5 5-5 5"
                      stroke="currentColor" stroke-width="1.6"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- 轮播容器 -->
        <div class="cards-carousel-wrapper" role="region" aria-label="板块卡片列表">
          <div class="cards-carousel" id="cards-carousel" role="list"></div>
        </div>

        <!-- 指示点 -->
        <div class="cards-dots" id="cards-dots"
             role="tablist" aria-label="卡片位置指示"></div>

      </section>

      <!-- 页脚 -->
      <footer class="home-footer" role="contentinfo">
        <span data-site-name></span> &copy; <span data-year></span>
      </footer>

    </div><!-- /#home-view -->

    <!-- ────────────────────────────
         子页面视图（板块 / 文章）
    ──────────────────────────── -->
    <div id="subpage-view" style="display:none">

      <!-- Hero 区域 -->
      <div class="subpage-hero">
        <div class="subpage-hero-bg" id="subpage-hero-bg"></div>
        <div class="subpage-hero-overlay" aria-hidden="true"></div>
        <div class="subpage-hero-content">
          <h1 class="subpage-title"    id="subpage-title"></h1>
          <p  class="subpage-subtitle" id="subpage-subtitle"></p>
        </div>
      </div>

      <!-- 内容区 + 目录侧边栏 -->
      <div class="subpage-body">

        <!-- 正文 -->
        <div class="subpage-content-wrap">
          <div id="subpage-content" class="subpage-content"></div>
        </div>

        <!-- 目录侧边栏（桌面端） -->
        <aside id="toc-sidebar" class="toc-sidebar"
               style="display:none" aria-label="文章目录">
          <div class="toc-sidebar-inner">
            <div class="toc-sidebar-title">目录</div>
            <nav id="toc-nav" class="toc-nav" aria-label="文章目录导航"></nav>
          </div>
        </aside>

      </div>

    </div><!-- /#subpage-view -->

  </main>

  <!-- ── 搜索面板 ── -->
  <div class="search-panel" id="search-panel"
       role="dialog" aria-modal="true" aria-label="搜索">
    <div class="search-panel-inner">

      <div class="search-input-wrap">
        <svg class="search-panel-icon" width="18" height="18"
             viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
          <path d="M15 15l3 3" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" class="search-input"
               placeholder="搜索板块或文章…"
               autocomplete="off" autocorrect="off"
               spellcheck="false" aria-label="搜索输入框">
        <button class="icon-btn" id="search-close-btn" aria-label="关闭搜索">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M4 4l10 10M14 4L4 14"
                  stroke="currentColor" stroke-width="1.6"
                  stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div id="search-results" class="search-results"
           role="listbox" aria-label="搜索结果">
        <div class="search-placeholder">
          <svg width="40" height="40" viewBox="0 0 40 40"
               fill="none" aria-hidden="true">
            <circle cx="18" cy="18" r="10"
                    stroke="currentColor" stroke-width="2"/>
            <path d="M26 26l6 6" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round"/>
          </svg>
          <span>输入关键词开始搜索</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ── 欢迎弹窗 ── -->
  <div class="overlay" id="overlay-welcome"
       role="dialog" aria-modal="true" aria-labelledby="welcome-title">
    <div class="overlay-panel">

      <button class="overlay-close-btn" id="close-welcome" aria-label="关闭欢迎弹窗">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M4 4l10 10M14 4L4 14"
                stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round"/>
        </svg>
      </button>

      <div class="welcome-header">
        <div class="welcome-icon" aria-hidden="true">🎓</div>
        <h2 class="welcome-title"    id="welcome-title"></h2>
        <p  class="welcome-subtitle" id="welcome-subtitle"></p>
      </div>

      <p class="welcome-desc" id="welcome-desc"></p>

      <div class="welcome-features" id="welcome-features"
           role="list" aria-label="功能介绍列表"></div>

      <button class="btn-primary welcome-start-btn" id="welcome-start-btn">
        开始探索 →
      </button>

    </div>
  </div>

  <!-- ── 设置弹窗 ── -->
  <div class="overlay" id="overlay-settings"
       role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="overlay-panel">

      <button class="overlay-close-btn" id="close-settings" aria-label="关闭设置">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M4 4l10 10M14 4L4 14"
                stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round"/>
        </svg>
      </button>

      <h2 class="overlay-title" id="settings-title">设置</h2>

      <!-- 主题设置 -->
      <div class="settings-row">
        <div class="settings-row-label">
          <span>主题</span>
          <span class="settings-row-desc" id="theme-label">浅色模式</span>
        </div>
        <button class="btn-secondary settings-theme-btn" id="settings-theme-btn"
                onclick="ThemeController.toggle()">
          切换
        </button>
      </div>

      <!-- 音量设置 -->
      <div class="settings-row settings-row-column">
        <div class="settings-row-label">
          <span>背景音乐音量</span>
        </div>
        <input type="range" id="volume-slider"
               class="volume-slider"
               min="0" max="100" step="1" value="60"
               aria-label="音量调节">
      </div>

      <!-- 欢迎弹窗开关 -->
      <div class="settings-row">
        <div class="settings-row-label">
          <span>不再显示欢迎页</span>
          <span class="settings-row-desc">下次访问不弹出欢迎介绍</span>
        </div>
        <label class="toggle-switch" aria-label="不再显示欢迎弹窗">
          <input type="checkbox" id="no-show-checkbox">
          <span class="toggle-track"></span>
        </label>
      </div>

    </div>
  </div>

  <!-- ── 音乐播放器 ── -->
  <div class="music-player" id="music-player"
       role="region" aria-label="背景音乐播放器">

    <button class="icon-btn music-btn" id="music-prev-btn" aria-label="上一首">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M12 3L6 8l6 5V3z" fill="currentColor"/>
        <rect x="3" y="3" width="2" height="10" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <button class="icon-btn music-btn music-play-btn" id="music-play-btn"
            aria-label="播放/暂停">
      <svg width="18" height="18" viewBox="0 0 24 24"
           fill="none" aria-hidden="true">
        <g id="music-play-icon"></g>
      </svg>
    </button>

    <button class="icon-btn music-btn" id="music-next-btn" aria-label="下一首">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M4 3l6 5-6 5V3z" fill="currentColor"/>
        <rect x="11" y="3" width="2" height="10" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <button class="music-track-info" id="music-expand-btn"
            aria-label="展开/收起曲目信息">
      <span class="music-track-name" id="music-track-name">加载中…</span>
    </button>

  </div>

  <!-- ── 浮动按钮组 ── -->
  <div class="fab-group" role="group" aria-label="快捷操作">

    <!-- 返回首页（子页面显示） -->
    <button class="fab-btn" id="fab-home"
            style="display:none" aria-label="返回首页">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 12L12 3l9 9" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- 返回顶部 -->
    <button class="fab-btn" id="fab-scroll-top" aria-label="返回顶部">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 19V5M5 12l7-7 7 7"
              stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>

  <!-- ── Toast 容器 ── */
  <div id="toast-container" class="toast-container"
       role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- ── 页面转场进度条 ── -->
  <div class="page-transition" id="page-transition" aria-hidden="true">
    <div class="transition-bar"></div>
  </div>

</div><!-- /#app -->

<!-- ── 脚本（顺序不可调换） ── -->
<script src="js/content.js"></script>
<script src="js/router.js"></script>
<script src="js/ui.js"></script>
<script src="js/music.js"></script>
<script src="js/app.js"></script>

</body>
</html>
